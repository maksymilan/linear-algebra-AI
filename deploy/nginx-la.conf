# Linear-Algebra-AI nginx 站点配置
# 放到 /etc/nginx/sites-available/la.conf 并软链到 sites-enabled/，再 nginx -t && systemctl reload nginx
# 把 server_name 改成你的域名或公网 IP；APP_DIR 改成你的实际部署路径。

# 登录/注册/验证码接口限流（按客户端 IP），缓解暴力破解与账号刷量。
# 本文件被 include 在 http 上下文，故 limit_req_zone 可放在 server 块之前。
limit_req_zone $binary_remote_addr zone=la_auth:10m rate=20r/m;

server {
    listen 80;
    server_name _;            # 改成你的域名，例如 la.example.com

    # 前端静态产物（vite build 输出）
    root /opt/linear-algebra-AI/frontend/dist;
    index index.html;

    # 课本 / 作业 / 图片上传可能较大
    client_max_body_size 100m;

    # 前端 SPA：找不到文件时回退到 index.html（支持 React Router 刷新）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 鉴权类接口单独限流（精确正则，优先级高于 /api/ 前缀）
    location ~ ^/api/auth/(login|register|request-code|reset-password)$ {
        limit_req zone=la_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反代到 Go（ai_service 只在本机被 Go 调用，不直接对外暴露）
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 批改 / 讲解 / 课本解析耗时较长，放宽超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
